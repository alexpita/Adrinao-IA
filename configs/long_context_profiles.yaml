  target_512k:
    context_tokens: 524288
    status: architecture_target
    purpose: "Obiettivo di prodotto Adriano, non training locale diretto su 4060 Ti."
    implementation_options:
      - "Backend remoto con GPU/RAM adeguate e modello long-context nativo."
      - "Qwen3-Coder o famiglia Qwen piu' adatta al contesto ultra-lungo, se compatibile con gli obiettivi Adriano."
      - "RAG + memoria gerarchica + compressione, per simulare 512k utili senza caricare tutto nel prompt."
    notes:
      - "Non impostare max_seq_length=524288 nel training QLoRA locale."
      - "Su 16 GB VRAM il collo di bottiglia e' il KV cache, non solo il peso del modello."

