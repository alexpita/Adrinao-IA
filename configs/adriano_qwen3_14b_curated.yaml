base_model: unsloth/Qwen3-14B-unsloth-bnb-4bit
output_dir: outputs/adriano-qwen3-14b-curated-lora
train_files:
  - data/curated/adriano_sft.jsonl

max_seq_length: 2048
packing: false
enable_thinking_template: false

lora:
  r: 16
  alpha: 16
  dropout: 0.0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  num_train_epochs: 1
  max_steps: 200
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  warmup_steps: 10
  weight_decay: 0.01
  lr_scheduler_type: cosine
  logging_steps: 1
  save_steps: 50
  seed: 3407

